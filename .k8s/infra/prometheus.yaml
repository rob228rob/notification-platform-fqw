apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
      scrape_timeout: 5s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - prometheus:9090

      - job_name: notification-facade
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - notification-facade:8910

      - job_name: notification-mail-sender
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - notification-mail-sender:8911

      - job_name: notification-sms-sender
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - notification-sms-sender:8914

      - job_name: history-writer
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - history-writer:8912

      - job_name: profile-consent
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - profile-consent:8913

      - job_name: scheduler-delivery
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - scheduler-delivery:8915

      - job_name: template-registry
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - template-registry:8916
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
              name: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  type: ClusterIP
