apiVersion: apps/v1
kind: Deployment
metadata:
  name: history-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: history-writer
  template:
    metadata:
      labels:
        app: history-writer
    spec:
      containers:
        - name: history-writer
          image: history-writer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8912
              name: http
            - containerPort: 9091
              name: grpc
          env:
            - name: SERVER_PORT
              value: "8912"
            - name: GRPC_SERVER_PORT
              value: "9091"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: POSTGRESQL_URL
              value: jdbc:postgresql://postgres:5432/main_db?currentSchema=nf_hist
            - name: POSTGRESQL_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRESQL_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8912
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8912
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: history-writer
spec:
  selector:
    app: history-writer
  ports:
    - name: http
      port: 8912
      targetPort: 8912
    - name: grpc
      port: 9091
      targetPort: 9091
  type: ClusterIP
