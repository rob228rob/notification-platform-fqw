apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-consent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-consent
  template:
    metadata:
      labels:
        app: profile-consent
    spec:
      containers:
        - name: profile-consent
          image: profile-consent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8913
              name: http
            - containerPort: 9096
              name: grpc
          env:
            - name: SERVER_PORT
              value: "8913"
            - name: PROFILE_CONSENT_GRPC_PORT
              value: "9096"
            - name: PROFILE_CONSENT_STORAGE_TYPE
              value: postgres
            - name: POSTGRESQL_URL
              value: jdbc:postgresql://postgres:5432/main_db?currentSchema=nf_prof
            - name: POSTGRESQL_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRESQL_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8913
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8913
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: profile-consent
spec:
  selector:
    app: profile-consent
  ports:
    - name: http
      port: 8913
      targetPort: 8913
    - name: grpc
      port: 9096
      targetPort: 9096
  type: ClusterIP
