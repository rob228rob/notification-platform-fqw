apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-mail-sender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-mail-sender
  template:
    metadata:
      labels:
        app: notification-mail-sender
    spec:
      containers:
        - name: notification-mail-sender
          image: notification-mail-sender:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8911
              name: http
          env:
            - name: SERVER_PORT
              value: "8911"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: MAIL_REDIS_HOST
              value: redis
            - name: MAIL_REDIS_PORT
              value: "6379"
            - name: MAIL_REDIS_USERNAME
              value: redisuser
            - name: MAIL_REDIS_PASSWORD
              value: redisuserpassword
            - name: CANCELLATION_SERVICE_HOST
              value: cancellation-service
            - name: CANCELLATION_SERVICE_PORT
              value: "9097"
            - name: MAIL_GATEWAY_LOG_ONLY
              value: "true"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8911
            initialDelaySeconds: 25
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8911
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-mail-sender
spec:
  selector:
    app: notification-mail-sender
  ports:
    - name: http
      port: 8911
      targetPort: 8911
  type: ClusterIP
