name: k3d_vm_deploy

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Allow Gradle wrapper execution
        run: chmod +x ./gradlew

      - name: Run unit and component tests
        run: ./gradlew clean test

      - name: Publish test count summary
        if: always()
        shell: python
        run: |
          import os
          import xml.etree.ElementTree as ET
          from collections import defaultdict
          from pathlib import Path

          reports = sorted(Path(".").glob("**/build/test-results/test/TEST-*.xml"))
          totals = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0}
          by_service = defaultdict(lambda: {"tests": 0, "failures": 0, "errors": 0, "skipped": 0})

          for report in reports:
              root = ET.parse(report).getroot()
              current = {
                  "tests": int(root.attrib.get("tests", 0)),
                  "failures": int(root.attrib.get("failures", 0)),
                  "errors": int(root.attrib.get("errors", 0)),
                  "skipped": int(root.attrib.get("skipped", 0)),
              }
              parts = report.parts
              service = parts[parts.index("services") + 1] if "services" in parts else "root"
              for key, value in current.items():
                  totals[key] += value
                  by_service[service][key] += value

          lines = [
              "## Test summary",
              "",
              f"JUnit report files: **{len(reports)}**",
              f"Total tests: **{totals['tests']}**",
              f"Failures: **{totals['failures']}**, errors: **{totals['errors']}**, skipped: **{totals['skipped']}**",
              "",
              "| Service | Tests | Failures | Errors | Skipped |",
              "|---|---:|---:|---:|---:|",
          ]

          for service, values in sorted(by_service.items()):
              lines.append(
                  f"| `{service}` | {values['tests']} | {values['failures']} | {values['errors']} | {values['skipped']} |"
              )

          summary = "\n".join(lines) + "\n"
          print(summary)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as output:
                  output.write(summary)

      - name: Publish JUnit report check
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: JUnit tests
          path: "**/build/test-results/test/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/**
            **/build/reports/tests/**
            **/build/test-results/test/**

  deploy-k3d:
    needs: test
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Pull, build and deploy k3d stand on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/own_apps/notification-platform-fqw
            git pull --ff-only

            ./gradlew \
              :services:notification-facade:bootJar \
              :services:notification-mail-sender:bootJar \
              :services:notification-sms-sender:bootJar \
              :services:profile-consent:bootJar \
              :services:history-writer:bootJar \
              :services:scheduler-delivery:bootJar \
              :services:template-registry:bootJar \
              :services:custom-loader:installDist

            services=(
              "notification-facade:notification-facade"
              "notification-mail-sender:notification-mail-sender"
              "notification-sms-sender:notification-sms-sender"
              "profile-consent:profile-consent"
              "history-writer:history-writer"
              "scheduler-delivery:scheduler-delivery"
              "template-registry:template-registry"
            )

            for service in "${services[@]}"; do
              module="${service%%:*}"
              image="${service##*:}"
              jar="$(find "services/${module}/build/libs" -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | sort | tail -n 1)"
              if [ -z "$jar" ]; then
                echo "Jar not found for ${module}" >&2
                exit 1
              fi
              docker build \
                -f .k8s/docker/Dockerfile.spring \
                --build-arg "JAR_FILE=${jar}" \
                -t "${image}:latest" \
                .
            done

            docker build -f services/custom-loader/Dockerfile -t custom-loader:latest .

            if ! k3d cluster list | awk 'NR>1 {print $1}' | grep -qx notification-platform; then
              k3d cluster create --config .k8s/k3d-config.yaml
            fi

            kubectl config use-context k3d-notification-platform

            k3d image import \
              notification-facade:latest \
              notification-mail-sender:latest \
              notification-sms-sender:latest \
              profile-consent:latest \
              history-writer:latest \
              scheduler-delivery:latest \
              template-registry:latest \
              custom-loader:latest \
              -c notification-platform

            kubectl apply -k .k8s

            kubectl rollout status deployment/template-registry -n notification-platform --timeout=180s
            kubectl rollout status deployment/profile-consent -n notification-platform --timeout=180s
            kubectl rollout status deployment/history-writer -n notification-platform --timeout=180s
            kubectl rollout status deployment/notification-facade -n notification-platform --timeout=180s
            kubectl rollout status deployment/notification-mail-sender -n notification-platform --timeout=180s
            kubectl rollout status deployment/notification-sms-sender -n notification-platform --timeout=180s
            kubectl rollout status deployment/scheduler-delivery -n notification-platform --timeout=180s

            kubectl get pods -n notification-platform
