name: build_test_vm_deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  pull_request:
    branches: ["master"]
  push:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Allow Gradle wrapper execution
        run: chmod +x ./gradlew

      - name: Run unit and component tests
        run: ./gradlew clean test --rerun-tasks

      - name: Publish test count summary
        if: always()
        shell: python
        run: |
          import os
          import xml.etree.ElementTree as ET
          from collections import defaultdict
          from pathlib import Path

          reports = sorted(Path(".").glob("**/build/test-results/test/TEST-*.xml"))
          totals = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0}
          by_service = defaultdict(lambda: {"tests": 0, "failures": 0, "errors": 0, "skipped": 0})

          for report in reports:
              root = ET.parse(report).getroot()
              current = {
                  "tests": int(root.attrib.get("tests", 0)),
                  "failures": int(root.attrib.get("failures", 0)),
                  "errors": int(root.attrib.get("errors", 0)),
                  "skipped": int(root.attrib.get("skipped", 0)),
              }
              parts = report.parts
              service = parts[parts.index("services") + 1] if "services" in parts else "root"
              for key, value in current.items():
                  totals[key] += value
                  by_service[service][key] += value

          is_green = totals["failures"] == 0 and totals["errors"] == 0
          title_icon = "✅" if is_green else "❌"
          skipped_icon = "🟡" if totals["skipped"] else "🟢"

          lines = [
              f"# {title_icon} Сводка тестов",
              "",
              "> ✅ без ошибок · 🟡 есть пропущенные тесты · ❌ есть падения",
              "",
              "| Показатель | Значение |",
              "|---|---:|",
              f"| 🧪 Всего тестов | **{totals['tests']}** |",
              f"| 📄 JUnit XML-отчётов | **{len(reports)}** |",
              f"| ❌ Падений | **{totals['failures']}** |",
              f"| 🔥 Ошибок | **{totals['errors']}** |",
              f"| {skipped_icon} Пропущено | **{totals['skipped']}** |",
              "",
              "## Разрез по сервисам",
              "",
              "| Статус | Сервис | Тесты | Падения | Ошибки | Пропущено |",
              "|---|---|---:|---:|---:|---:|",
          ]

          for service, values in sorted(by_service.items()):
              service_icon = "❌" if values["failures"] or values["errors"] else ("🟡" if values["skipped"] else "✅")
              lines.append(
                  f"| {service_icon} | `{service}` | {values['tests']} | {values['failures']} | {values['errors']} | {values['skipped']} |"
              )

          summary = "\n".join(lines) + "\n"
          print(summary)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as output:
                  output.write(summary)

      - name: Publish JUnit report check
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: JUnit tests
          path: "**/build/test-results/test/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/**
            **/build/reports/tests/**
            **/build/test-results/test/**

  coverage:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Allow Gradle wrapper execution
        run: chmod +x ./gradlew

      - name: Build coverage report
        run: ./gradlew clean test coverageReport --rerun-tasks

      - name: Publish optimistic coverage summary
        if: always()
        shell: python
        run: |
          import os
          import xml.etree.ElementTree as ET
          from collections import defaultdict
          from pathlib import Path

          reports = sorted(Path(".").glob("**/build/reports/jacoco/test/jacocoTestReport.xml"))
          counters = ("INSTRUCTION", "LINE", "BRANCH", "METHOD", "CLASS")
          totals = {name: {"missed": 0, "covered": 0} for name in counters}
          by_module = defaultdict(lambda: {name: {"missed": 0, "covered": 0} for name in counters})

          for report in reports:
              root = ET.parse(report).getroot()
              parts = report.parts
              if "services" in parts:
                  module = parts[parts.index("services") + 1]
              elif "libs" in parts:
                  module = f"libs:{parts[parts.index('libs') + 1]}"
              else:
                  module = "root"
              _ = by_module[module]

              for counter in root.findall("counter"):
                  counter_type = counter.attrib.get("type")
                  if counter_type not in totals:
                      continue
                  missed = int(counter.attrib.get("missed", 0))
                  covered = int(counter.attrib.get("covered", 0))
                  totals[counter_type]["missed"] += missed
                  totals[counter_type]["covered"] += covered
                  by_module[module][counter_type]["missed"] += missed
                  by_module[module][counter_type]["covered"] += covered

          def ratio(value):
              total = value["missed"] + value["covered"]
              return None if total == 0 else value["covered"] / total

          def percent(value):
              current = ratio(value)
              return "n/a" if current is None else f"{current * 100:.2f}%"

          def status_icon(value):
              current = ratio(value)
              if current is None:
                  return "⚪"
              if current >= 0.70:
                  return "🟢"
              if current >= 0.40:
                  return "🟡"
              return "🔴"

          available = [(name, ratio(value)) for name, value in totals.items() if ratio(value) is not None]
          optimistic_name, optimistic_ratio = max(available, key=lambda item: item[1]) if available else ("n/a", None)
          optimistic_percent = "n/a" if optimistic_ratio is None else f"{optimistic_ratio * 100:.2f}%"

          lines = [
              "# 📊 Покрытие тестами",
              "",
              f"> 🟢 **Оптимистичная оценка покрытия: {optimistic_percent}** по метрике `{optimistic_name}`.",
              "",
              f"> Найдено JaCoCo XML-отчётов: **{len(reports)}**. Оптимистичная оценка считается как максимум среди `INSTRUCTION`, `LINE`, `BRANCH`, `METHOD`, `CLASS`.",
              "",
              "| Метрика | Покрытие | Covered | Missed |",
              "|---|---:|---:|---:|",
          ]

          for name in counters:
              value = totals[name]
              lines.append(
                  f"| {status_icon(value)} `{name}` | **{percent(value)}** | {value['covered']} | {value['missed']} |"
              )

          lines.extend([
              "",
              "## Разрез по модулям",
              "",
              "| Модуль | Лучшее | Метрика | Инструкции | Строки | Ветвления | Методы | Классы |",
              "|---|---:|---|---:|---:|---:|---:|---:|",
          ])

          for module, values in sorted(by_module.items()):
              module_available = [(name, ratio(value)) for name, value in values.items() if ratio(value) is not None]
              best_name, best_ratio = max(module_available, key=lambda item: item[1]) if module_available else ("n/a", None)
              best_percent = "n/a" if best_ratio is None else f"{best_ratio * 100:.2f}%"
              lines.append(
                  f"| `{module}` | **{best_percent}** | `{best_name}` | {percent(values['INSTRUCTION'])} | {percent(values['LINE'])} | {percent(values['BRANCH'])} | {percent(values['METHOD'])} | {percent(values['CLASS'])} |"
              )

          summary = "\n".join(lines) + "\n"
          print(summary)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as output:
                  output.write(summary)

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            build/reports/jacoco/**
            **/build/reports/jacoco/**

  deploy:
    needs: coverage
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: deploy stage
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/own_apps/notification-platform-fqw
            git pull --ff-only
            cd deploy
            docker compose up -d --remove-orphans

