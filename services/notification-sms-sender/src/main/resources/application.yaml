spring:
  application:
    name: notification-sms-sender
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  data:
    redis:
      host: ${SMS_REDIS_HOST:localhost}
      port: ${SMS_REDIS_PORT:6379}
      username: ${SMS_REDIS_USERNAME:redisuser}
      password: ${SMS_REDIS_PASSWORD:redisuserpassword}
      timeout: 3s
      connect-timeout: 3s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-sms-sender}
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3
    properties:
      enable.idempotence: true
      max.in.flight.requests.per.connection: 1
      delivery.timeout.ms: 120000
      request.timeout.ms: 30000
      linger.ms: 5
      batch.size: 32768
  task:
    scheduling:
      pool:
        size: 4
      shutdown:
        await-termination: true
        await-termination-period: 5m

outbox:
  relay:
    enabled: true
    fixed-delay: 10000ms
    lease-duration: 30s
    batch-size: 100
    schema: nf_sms
    table: outbox_message
    topics:
      events: ${SMS_SENDER_EVENTS_TOPIC:notification.facade.events}
      sms-dispatches: ${SMS_SENDER_DISPATCHES_TOPIC:notification.sms.dispatches}
      sms-delivery-statuses: ${SMS_SENDER_DELIVERY_STATUSES_TOPIC:notification.sms.delivery-statuses}
      delivery-fallback: ${SMS_SENDER_DELIVERY_FALLBACK_TOPIC:delivery.fallback}
    producer-retry:
      max-attempts: 8
      initial-backoff: 100ms
      multiplier: 2.0
      max-backoff: 5s

delivery:
  sms:
    enabled: true
    legacy-postgres-pipeline-enabled: false
    inbox-batch-size: 100
    delivery-batch-size: 100
    inbox-fixed-delay: 10000ms
    delivery-fixed-delay: 15000ms
    history-check-enabled: true
    history-check-lookback-hours: 24
    max-total-deliveries-in-window: 3
    max-attempts: 3
    retry-backoff: 5m
    dedup-ttl: ${SMS_DEDUP_TTL:6h}
    gateway:
      log-only: ${SMS_GATEWAY_LOG_ONLY:true}
      sender: ${SMS_GATEWAY_SENDER:notification-platform}
  notification-event:
    enabled: true
    inbox-batch-size: 100
    fixed-delay: 10000ms

clients:
  cancellation:
    host: ${CANCELLATION_SERVICE_HOST:localhost}
    port: ${CANCELLATION_SERVICE_PORT:9097}
    deadline: 3s
  profile-consent:
    host: ${PROFILE_CONSENT_HOST:localhost}
    port: ${PROFILE_CONSENT_PORT:9096}
    deadline: 3s
  notification-history:
    host: ${NOTIFICATION_HISTORY_HOST:localhost}
    port: ${NOTIFICATION_HISTORY_PORT:9091}
    deadline: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    root: INFO
    ru.batoyan.vkr.notification.sms.sender: INFO
