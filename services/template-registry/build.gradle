plugins {
    id "org.springframework.boot"
    id "io.spring.dependency-management"
    id "java"
}

tasks.named("bootJar") {
    archiveFileName = "template-registry.jar"
}

dependencies {
    implementation project(":libs:proto-facade")
    implementation project(":libs:proto-common")
    implementation project(":libs:proto-templates")
    implementation "net.devh:grpc-server-spring-boot-starter:3.1.0.RELEASE"

    // --- Spring Boot starters ---
    implementation "org.springframework.boot:spring-boot-starter-web"
    implementation "org.springframework.boot:spring-boot-starter-actuator"
    implementation "org.springframework.boot:spring-boot-starter-validation"

    implementation "org.springframework.boot:spring-boot-starter-security"
    implementation "org.springframework.boot:spring-boot-starter-oauth2-client"
    implementation "org.springframework.boot:spring-boot-starter-oauth2-resource-server"

    implementation "org.springframework.boot:spring-boot-starter-jdbc"
    runtimeOnly  "com.h2database:h2"

    // --- Kafka ---
    implementation "org.springframework.kafka:spring-kafka"

    // --- OpenAPI UI ---
    implementation "org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.5"

    implementation "org.springframework.boot:spring-boot-starter-aop"

    implementation "org.flywaydb:flyway-core"
    implementation "org.flywaydb:flyway-database-postgresql"
    runtimeOnly  "org.postgresql:postgresql"

    // Template rendering
    implementation "com.github.jknack:handlebars:4.4.0"

    // --- Keycloak admin client ---
    implementation "org.keycloak:keycloak-admin-client:25.0.3"

    // --- JWT
    runtimeOnly  "io.jsonwebtoken:jjwt-jackson:0.12.6"

    // --- Прочее ---
    implementation "com.fasterxml.jackson.core:jackson-databind:2.17.2"
    implementation "org.modelmapper:modelmapper:3.2.0"
    implementation "com.fasterxml.uuid:java-uuid-generator:4.1.0"
    implementation "org.jetbrains:annotations:26.1.0"

    implementation "org.flywaydb:flyway-core"

    // --- Lombok (optional в pom) ---
    compileOnly "org.projectlombok:lombok"
    annotationProcessor "org.projectlombok:lombok"
    testCompileOnly "org.projectlombok:lombok"
    testAnnotationProcessor "org.projectlombok:lombok"

    // --- Tests ---
    testImplementation "org.springframework.boot:spring-boot-starter-test"
    testImplementation "org.mockito:mockito-core"
    testImplementation "org.springframework.security:spring-security-test"

    testImplementation "org.junit.jupiter:junit-jupiter-api:5.11.2"
}

tasks.test { useJUnitPlatform() }
