application:
  version: 1.0
  name: "base-template"
  description: ""

  # возможно deprecated
  admin-data:
    email: ${ADMIN_ACCOUNT_EMAIL:admin@gmail.com}
    password: ${ADMIN_ACCOUNT_PSSWD:qweqweqwe}

security:
  grpc:
    client-id-claim: client_id

spring:
  application:
    name: templates-registry

  config:
    import: classpath:creds/user-creds.yaml
  data:
    mongodb:
      uri: ${mongodb.uri}
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${kafka.bootstrap.servers:localhost:9093}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:group-id}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: ${KAFKA_PRODUCER_ACKS:all}
      retries: ${KAFKA_PRODUCER_RETRIES:3}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    properties:
      enable.idempotence: true
      max.in.flight.requests.per.connection: 1
      delivery.timeout.ms: 120000
      request.timeout.ms: 30000
      linger.ms: 5
      batch.size: 32768
      security:
        protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
#      sasl:
#        mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
#        jaas:
#          config: >
#            org.apache.kafka.common.security.plain.PlainLoginModule required
#            username="${kafka.user.username}"
#            password="${kafka.user.password}";

    admin:
      security:
        protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      auto-create: true
  task:
    scheduling:
      pool:
        size: 16
      shutdown:
        await-termination: true
        await-termination-period: 5m

grpc:
  server:
    auth:
      enabled: false

server:
  port: ${SERVER_PORT:8910}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}

logging:
  level:
    root: INFO
    ru.batoyan.vkr.notification.templates: DEBUG
    com.mai.proj: DEBUG
    org:
      springframework:
        data.mongodb.core.MongoTemplate: INFO
        security: INFO


management:
  health:
    elasticsearch:
      enabled: false
  endpoints:
    web.exposure.include: '*'
  endpoint:
    restart.enabled: true
    health:
      show-details: always
      probes.enabled: true
      group:
        readiness:
          include: "readinessState"
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /index.html
    disable-swagger-default-url: true
    config-url: /api-docs/swagger-config
    url: /api-docs
    tryItOutEnabled: true
    operationsSorter: method
    tagsSorter: alpha
    filter: true
  packages-to-scan: com.mai.proj
