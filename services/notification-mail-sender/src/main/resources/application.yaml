application:
  version: 1.0
  name: "base-template"
  description: ""

outbox:
  relay:
    enabled: true
    fixed-delay: 500ms
    lease-duration: 30s
    batch-size: 1000
    schema: nf_mail
    table: outbox_message
    topics:
      events: notification.facade.events
      dispatches: notification.facade.dispatches
      mail-dispatches: notification.mail.dispatches
      mail-delivery-statuses: notification.mail.delivery-statuses
    producer-retry:
      max-attempts: 8
      initial-backoff: 100ms
      multiplier: 2.0
      max-backoff: 5s

delivery:
  mail:
    enabled: true
    inbox-batch-size: 500
    delivery-batch-size: 500
    inbox-fixed-delay: 500ms
    delivery-fixed-delay: 500ms
    counting-window: 1d
    history-check-enabled: true
    default-max-deliveries: 2500
    max-attempts: 3
    retry-backoff: 5m
    gateway:
      from: ${MAIL_FROM:no-reply@dev.local}
      subject-fallback-prefix: ${MAIL_SUBJECT_FALLBACK_PREFIX:[notification]}
      log-only: ${MAIL_GATEWAY_LOG_ONLY:true}
  notification-event:
    enabled: true
    inbox-batch-size: 1000
    fixed-delay: 500ms

clients:
  profile-consent:
    host: ${PROFILE_CONSENT_HOST:localhost}
    port: ${PROFILE_CONSENT_PORT:9096}
    deadline: 3s
  notification-history:
    host: ${NOTIFICATION_HISTORY_HOST:localhost}
    port: ${NOTIFICATION_HISTORY_PORT:9091}
    deadline: 3s

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: notification-mail-sender

  config:
    import: classpath:creds/user-creds.yaml

  flyway:
    locations: classpath:db/migration
#  autoconfigure:
#    exclude:
#      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  kafka:
    bootstrap-servers: ${kafka.bootstrap.servers:localhost:9093}
    listener:
      concurrency: 8
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:group-id}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: ${KAFKA_PRODUCER_ACKS:all}
      retries: ${KAFKA_PRODUCER_RETRIES:3}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    properties:
      enable.idempotence: true
      max.in.flight.requests.per.connection: 1
      delivery.timeout.ms: 120000
      request.timeout.ms: 30000
      linger.ms: 5
      batch.size: 32768
      security:
        protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
#      sasl:
#        mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
#        jaas:
#          config: >
#            org.apache.kafka.common.security.plain.PlainLoginModule required
#            username="${kafka.user.username}"
#            password="${kafka.user.password}";

    admin:
      security:
        protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      auto-create: true
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
    hibernate:
      # set update or create to first startup
      ddl-auto: none

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${postgresql.url}
    password: ${postgresql.user.password}
    username: ${postgresql.user.username}
    hikari:
      maximum-pool-size: 25

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}

  batch:
    jdbc:
      initialize-schema: always

  task:
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 5m

logging:
  level:
    root: INFO
    ru.batoyan.vkr.notification.mail: INFO
    liquibase: DEBUG
    org:
      springframework:
        jdbc: INFO
        orm: INFO
        orm.jpa.JpaTransactionManager: INFO
        security: INFO
      hibernate:
        jpa: INFO
        tool.hbm2ddl: INFO
        SQL: INFO
        type.descriptor.sql.BasicBinder: INFO


management:
  health:
    elasticsearch:
      enabled: false
    mail:
      enabled: false
  endpoints:
    web.exposure.include: '*'
  endpoint:
    restart.enabled: true
    health:
      show-details: always
      probes.enabled: true
      group:
        readiness:
          include: "readinessState"
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /index.html
    disable-swagger-default-url: true
    config-url: /api-docs/swagger-config
    url: /api-docs
    tryItOutEnabled: true
    operationsSorter: method
    tagsSorter: alpha
    filter: true
  packages-to-scan: com.mai.proj

server:
  port: ${SERVER_PORT:8911}
