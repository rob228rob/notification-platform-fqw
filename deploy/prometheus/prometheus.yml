global:
  scrape_interval: 10s
  evaluation_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: notification-facade
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8910

  - job_name: notification-mail-sender
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8911

  - job_name: history-writer
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8912

  - job_name: profile-consent
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8913
