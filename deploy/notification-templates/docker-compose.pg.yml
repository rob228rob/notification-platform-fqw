services:
  templates-registry-pg:
    image: postgres:latest
    environment:
      POSTGRES_DB: templates_registry
      POSTGRES_USER: ${MAIN_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${MAIN_DB_PASSWD:-postgres}
    ports:
      - "45432:5432"
    volumes:
      - pg_data-templates:/var/lib/postgresql/data
    networks:
      - shared

volumes:
  pg_data-templates: